name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check manifest has no dev-only match patterns
        run: |
          if grep -q 'localhost\|127\.0\.0\.1' manifest.json; then
            echo "ERROR: manifest.json contains localhost/127.0.0.1 match patterns."
            echo "Remove dev-only entries from the matches array before releasing."
            exit 1
          fi

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./manifest.json').version")" >> $GITHUB_OUTPUT

      - name: Build Edge extension zip
        run: |
          zip snvtb-enhancer-edge-v${{ steps.version.outputs.version }}.zip \
            manifest.json \
            *.html \
            *.js \
            images/icon16.png images/icon48.png images/icon128.png \
            -x "bump-version.js" "package*.json"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            "snvtb-enhancer-edge-v${VERSION}.zip"
